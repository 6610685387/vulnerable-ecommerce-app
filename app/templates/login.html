{% extends 'base.html' %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="w-full max-w-sm bg-surface-container-lowest border border-outline-variant rounded-2xl shadow-md p-8">

    <div class="text-center mb-8">
      <span class="material-symbols-outlined text-5xl text-primary">lock</span>
      <h1 class="text-2xl font-bold text-on-surface mt-2">Sign In</h1>
      <p class="text-sm text-secondary mt-1">Access your ShopVuln account</p>
    </div>

    {% if error %}
    <div class="mb-4 px-4 py-3 rounded-lg bg-error-container text-error text-sm font-medium">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-on-surface-variant mb-1">Username or Email Address</label>
        <input type="text" name="login_id" id="login_id" required
               class="w-full px-4 py-2 rounded-lg border border-outline-variant bg-surface-container-low
                      text-on-surface text-sm focus:outline-none focus:ring-2 focus:ring-primary transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-on-surface-variant mb-1">Password</label>
        <input type="password" name="password" id="password" required
               class="w-full px-4 py-2 rounded-lg border border-outline-variant bg-surface-container-low
                      text-on-surface text-sm focus:outline-none focus:ring-2 focus:ring-primary transition">
      </div>
      <button type="submit" id="btn-login"
              class="w-full bg-primary text-white font-semibold py-2.5 rounded-lg hover:opacity-90 transition">
        Sign In
      </button>
    </form>

    <p class="text-xs text-center text-secondary mt-6">
      Demo accounts: alice / alice123 &nbsp;|&nbsp; admin / admin999
    </p>
  </div>
</div>
{% endblock %}
