{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto">
    <div class="mb-6">
        <a href="/" class="text-secondary hover:text-primary flex items-center gap-1 text-sm">
            <span class="material-symbols-outlined text-base">arrow_back</span> Back to Shop
        </a>
    </div>

    <div class="bg-surface-container-lowest rounded-xl border border-outline-variant shadow-sm p-6">
        <h2 class="text-xl font-bold text-on-surface mb-1">🛒 Purchase</h2>
        <p class="text-sm text-on-surface-variant mb-6">{{ product['name'] }}</p>

        <div class="flex justify-between items-center py-3 border-b border-outline-variant mb-6">
            <span class="text-on-surface-variant text-sm">Unit Price</span>
            <span class="text-2xl font-bold text-primary">฿{{ "{:,.2f}".format(product['price']) }}</span>
        </div>

        <form method="POST">
            <!-- VULNERABLE: price is in a hidden field → can be modified in DevTools! -->
            <input type="hidden" name="price" value="{{ product['price'] }}">

            <div class="mb-4">
                <label class="block text-sm font-medium text-on-surface mb-2">Quantity</label>
                <input type="number" name="quantity"
                    class="w-full rounded-lg border border-outline-variant px-4 py-2 text-on-surface bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-primary"
                    value="1" min="1" max="99">
            </div>

            <button type="submit"
                class="w-full py-3 bg-primary text-white font-semibold rounded-lg hover:opacity-90 transition-opacity">
                Confirm Purchase
            </button>
        </form>

        <p class="mt-4 text-xs text-on-surface-variant text-center">
            💡 Hint: Try inspecting this page's hidden fields before submitting
        </p>
    </div>
</div>
{% endblock %}
