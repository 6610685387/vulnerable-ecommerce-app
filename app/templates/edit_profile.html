{% extends 'base.html' %}
{% block content %}
<div class="max-w-lg mx-auto">

  <div class="mb-8">
    <h1 class="text-2xl font-bold text-on-surface">Edit Profile</h1>
    <p class="text-sm text-secondary mt-1">Update your account information.</p>
  </div>

  <!-- Profile info card -->
  <div class="bg-surface-container-lowest border border-outline-variant rounded-2xl shadow-sm p-6 mb-6">
    <div class="flex items-center gap-4 mb-6">
      <div class="w-14 h-14 rounded-full bg-primary flex items-center justify-center text-white text-2xl font-bold uppercase">
        {{ user.username[0] }}
      </div>
      <div>
        <p class="font-semibold text-on-surface">{{ user.username }}</p>
        <p class="text-sm text-secondary">{{ user.role }}</p>
      </div>
    </div>

    <!-- ❌ VULNERABLE FORM: ไม่มี CSRF token -->
    <form method="POST" action="/account/edit" id="edit-profile-form">
      <div class="mb-5">
        <label class="block text-sm font-medium text-on-surface-variant mb-1">
          Email Address
        </label>
        <input type="email" name="email" id="input-email" required
               value="{{ user.email }}"
               class="w-full px-4 py-2 rounded-lg border border-outline-variant bg-surface-container-low
                      text-on-surface text-sm focus:outline-none focus:ring-2 focus:ring-primary transition">
      </div>

      <button type="submit" id="btn-save-profile"
              class="w-full bg-primary text-white font-semibold py-2.5 rounded-lg hover:opacity-90 transition">
        Save Changes
      </button>
    </form>
  </div>

  <!-- Current info display -->
  <div class="bg-surface-container-low border border-outline-variant rounded-xl p-4 text-sm text-secondary">
    <p>Current email: <span class="font-medium text-on-surface">{{ user.email }}</span></p>
  </div>

</div>
{% endblock %}
