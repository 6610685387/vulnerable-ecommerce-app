{% extends 'base.html' %}
{% block content %}
<div class="max-w-xl mx-auto">

  <div class="mb-8">
    <a href="{{ url_for('account.profile') }}" class="inline-flex items-center gap-2 text-primary hover:underline mb-4">
        <span class="material-symbols-outlined text-sm">arrow_back</span>
        <span class="text-sm font-bold">Back to Account</span>
    </a>
    <h1 class="text-3xl font-bold text-on-surface">Change Password</h1>
    <p class="text-sm text-secondary mt-1">Set a new password for your account.</p>
  </div>

  <div class="bg-surface-container-lowest border border-outline-variant rounded-2xl shadow-sm p-8">
    <div class="bg-error-container text-error px-4 py-3 rounded-xl mb-6 flex items-center gap-3">
        <span class="material-symbols-outlined">warning</span>
        <p class="text-xs font-bold">Security Note: You do not need to provide your current password.</p>
    </div>

    <form method="POST" action="{{ url_for('account.change_password') }}" id="change-password-form">
      <div class="mb-8">
        <label class="block text-sm font-bold text-on-surface mb-2">New Password</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-secondary text-xl">lock_open</span>
          <input type="password" name="password" id="input-password" required
                 placeholder="Enter new password"
                 class="w-full pl-11 pr-4 py-3 rounded-xl border border-outline-variant bg-surface-container-low
                        text-on-surface focus:outline-none focus:ring-2 focus:ring-primary transition shadow-inner">
        </div>
      </div>

      <div class="flex flex-col sm:flex-row gap-4">
          <button type="submit" id="btn-save-password"
                  class="flex-1 bg-error text-white font-bold py-3 rounded-xl hover:opacity-90 transition shadow-md">
            Update Password
          </button>
          <a href="{{ url_for('account.profile') }}"
             class="flex-1 text-center border border-outline-variant text-secondary font-bold py-3 rounded-xl hover:bg-surface-container-low transition">
            Cancel
          </a>
      </div>
    </form>
  </div>

</div>
{% endblock %}
